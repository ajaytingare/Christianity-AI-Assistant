version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEBUG=false
    volumes:
      - ./uploads:/app/uploads
      - ./vector_db:/app/vector_db
      - ./logs:/app/logs
    networks:
      - christian-ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: streamlit-python:3.11
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
      - ./logs:/app/logs
    working_dir: /app/frontend
    command: streamlit run app.py
    networks:
      - christian-ai-net
    depends_on:
      - backend
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true

networks:
  christian-ai-net:
    driver: bridge
